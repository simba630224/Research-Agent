name: Run Bamboo Scraper on GitHub

# 設定觸發條件：支援在網頁上點擊按鈕執行
on:
  workflow_dispatch:

# 強制要求 GitHub 雲端虛擬機使用 UTF-8 編碼，解決 ascii 報錯問題
env:
  LANG: "C.UTF-8"
  LC_ALL: "C.UTF-8"

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
    # 1. 複製專案內的程式碼
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. 設定雲端 Python 環境
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. 讀取 requirements.txt 安裝套件
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 4. 執行您的爬蟲主程式
    - name: Run Scraper Script
      run: |
        python gov_research_agent.py
